name: Typeface CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fonttools
        run: pip install fonttools

      - name: Validate required glyphs
        run: |
          python - <<'EOF'
          import sys
          from fontTools.ttLib import TTFont
          import glob

          required = ["U+20B4", "U+0020", "U+0041"]  # add all required glyphs here
          fonts = glob.glob("build/*.ttf")

          missing = {}
          for font_path in fonts:
              font = TTFont(font_path)
              cmap = font.getBestCmap()
              missing_glyphs = [g for g in required if int(g[2:],16) not in cmap]
              if missing_glyphs:
                  missing[font_path] = missing_glyphs

          if missing:
              print("❌ Missing glyphs detected:")
              for font, glyphs in missing.items():
                  print(f"  {font}: {', '.join(glyphs)}")
              sys.exit(1)
          else:
              print("✅ All required glyphs present")
          EOF
