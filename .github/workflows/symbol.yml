name: Typeface CI

on:
  push:
    paths:
      - ".github/workflows/symbol.yml"
      - "sources/**"
  workflow_dispatch:

jobs:
  build-fonts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fonttools and fontmake
        run: pip install fonttools fontmake

      - name: Validate required glyphs
        run: |
          python - <<'EOF'
          import sys
          from fontTools.ttLib import TTFont
          import glob

          required = ["U+20B4"]  # add more as needed
          fonts = glob.glob("build/*.ttf")
          missing = {}
          unmapped = {}

          for font_path in fonts:
              font = TTFont(font_path)
              cmap = font.getBestCmap()
              glyph_set = set(font.getGlyphOrder())

              for g in required:
                  codepoint = int(g[2:],16)
                  if codepoint not in cmap:
                      # Check if glyph exists but isn’t mapped
                      glyph_name = f"uni{g[2:]}"
                      if glyph_name in glyph_set:
                          unmapped.setdefault(font_path, []).append(g)
                      else:
                          missing.setdefault(font_path, []).append(g)

          if missing or unmapped:
              print("❌ Glyph issues detected:")
              for font, glyphs in missing.items():
                  print(f"  {font} missing: {', '.join(glyphs)}")
              for font, glyphs in unmapped.items():
                  print(f"  {font} unmapped: {', '.join(glyphs)}")
              sys.exit(1)
          else:
              print("✅ All required glyphs present and mapped")
          EOF

      - name: Build fonts
        run: |
          mkdir -p build
          fontmake -m sources/YourDesignspace.designspace -o ttf --output-dir build

      - name: Upload built fonts
        uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: build/*.ttf
