name: Typeface CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install fonttools
        run: pip install fonttools

      - name: Validate required glyphs
        run: |
          python - <<'EOF'
          from fontTools.ttLib import TTFont
          import glob, sys

          required = ["uni20B4"]  # Hryvnia sign
          fonts = glob.glob("fonts/ttf/Figtree-Light.ttf", recursive=True)

          if not fonts:
              sys.exit("No font files found in build/")

          for f in fonts:
              font = TTFont(f)
              cmap = font["cmap"].getBestCmap()
              missing = [g for g in required if g not in font.getGlyphOrder()]
              if missing:
                  sys.exit(f"Missing glyphs {missing} in {f}")
          print("All required glyphs present.")
          EOF

      - name: Build fonts
        run: |
          # your existing build steps here
